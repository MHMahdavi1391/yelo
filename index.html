<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YELO Music</title>
    
    <!-- ===== Font Awesome ===== -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- ===== Custom Font from root ===== -->
    <style>
        @font-face {
            font-family: 'CustomFont';
            src: url('./font.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        /* ===== Reset & Base ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f5f5f7;
            --bg-surface: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #1c1c1e;
            --text-secondary: #6c6c70;
            --text-muted: #8e8e93;
            --border-subtle: rgba(0, 0, 0, 0.06);
            --shadow-soft: 0 2px 12px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.02);
            --shadow-hover: 0 8px 30px rgba(0, 0, 0, 0.08);
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 12px;
            --transition-smooth: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --font-family: 'CustomFont', 'Inter', -apple-system, system-ui, sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #0a0a0b;
                --bg-surface: #1c1c1e;
                --bg-card: #2c2c2e;
                --text-primary: #f5f5f7;
                --text-secondary: #aeaeb2;
                --text-muted: #6c6c70;
                --border-subtle: rgba(255, 255, 255, 0.06);
                --shadow-soft: 0 2px 12px rgba(0, 0, 0, 0.4);
                --shadow-hover: 0 8px 30px rgba(0, 0, 0, 0.6);
            }
        }

        body {
            font-family: var(--font-family);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 24px 16px;
            transition: background 0.2s, color 0.2s;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        /* ===== Header ===== */
        .header {
            width: 100%;
        }

        .header-top {
            display: flex;
            flex-direction: column;
            gap: 18px;
            align-items: center;
        }

        @media (min-width: 600px) {
            .header-top {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
        }

        .logo-wrapper {
            flex-shrink: 0;
        }

        .logo-img {
            height: 48px;
            width: auto;
            object-fit: contain;
            border-radius: 8px;
        }

        .search-wrapper {
            flex: 1;
            max-width: 480px;
            width: 100%;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: var(--bg-surface);
            border-radius: 30px;
            padding: 0 16px;
            border: 1px solid var(--border-subtle);
            box-shadow: var(--shadow-soft);
            transition: all 0.2s;
        }
        .search-box:focus-within {
            border-color: var(--text-primary);
            box-shadow: var(--shadow-hover);
        }

        .search-icon {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-right: 10px;
            font-family: 'Font Awesome 6 Free', 'Font Awesome 6 Brands', sans-serif;
            font-weight: 900;
        }

        .search-input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            padding: 12px 0;
            font-size: 0.9rem;
            color: var(--text-primary);
            font-family: var(--font-family);
        }
        .search-input::placeholder {
            color: var(--text-muted);
        }

        .clear-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 6px;
            font-size: 0.75rem;
            transition: color 0.2s;
            font-family: 'Font Awesome 6 Free', 'Font Awesome 6 Brands', sans-serif;
            font-weight: 900;
        }
        .clear-btn:hover {
            color: var(--text-primary);
        }

        /* ===== Song Grid ===== */
        .song-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        @media (min-width: 500px) {
            .song-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }
        }

        @media (min-width: 800px) {
            .song-grid {
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            }
        }

        .song-card {
            background: var(--bg-surface);
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-soft);
            border: 1px solid var(--border-subtle);
            transition: all 0.25s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .song-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-hover);
            border-color: var(--text-primary);
        }
        .song-card:active {
            transform: scale(0.97);
        }

        .song-card-cover {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            display: block;
            background: var(--bg-card);
        }

        .song-card-info {
            padding: 12px 14px 16px;
        }
        .song-card-title {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 2px;
            line-height: 1.3;
            font-family: var(--font-family);
            color: var(--text-primary);
        }
        .song-card-artist {
            font-weight: 400;
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-family: var(--font-family);
        }
        .song-card-badge {
            display: inline-block;
            margin-top: 8px;
            font-size: 0.65rem;
            padding: 2px 10px;
            border-radius: 20px;
            background: var(--border-subtle);
            color: var(--text-muted);
            font-family: var(--font-family);
        }

        /* ===== No Results ===== */
        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .no-results i {
            font-size: 2.4rem;
            margin-bottom: 12px;
            opacity: 0.4;
            font-family: 'Font Awesome 6 Free', 'Font Awesome 6 Brands', sans-serif;
            font-weight: 900;
        }
        .no-results p {
            font-family: var(--font-family);
        }

        /* ===== Footer ===== */
        .footer {
            margin-top: 20px;
            padding-top: 24px;
            border-top: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            text-align: center;
        }

        .footer-content {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .footer-logo {
            height: 32px;
            width: auto;
            object-fit: contain;
            border-radius: 6px;
        }
        .footer-content span {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-family: var(--font-family);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
            padding: 6px 16px;
            border-radius: 20px;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            box-shadow: var(--shadow-soft);
            transition: all 0.2s;
            font-family: var(--font-family);
        }
        .back-link i {
            font-family: 'Font Awesome 6 Free', 'Font Awesome 6 Brands', sans-serif;
            font-weight: 900;
        }
        .back-link:hover {
            background: var(--bg-card);
            color: var(--text-primary);
            transform: translateX(-4px);
        }

        /* ===== Responsive ===== */
        @media (max-width: 500px) {
            .song-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 14px;
            }
            .song-card-info {
                padding: 10px 12px 14px;
            }
            .song-card-title {
                font-size: 0.85rem;
            }
            .search-box {
                padding: 0 12px;
            }
            .search-input {
                font-size: 0.8rem;
                padding: 10px 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-top">
                <div class="logo-wrapper">
                    <img src="logo.jpg" alt="YELO" class="logo-img" loading="lazy">
                </div>
                <div class="search-wrapper">
                    <div class="search-box">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" id="searchInput" class="search-input" placeholder="Search music or artist..." autocomplete="off">
                        <button id="clearSearch" class="clear-btn" style="display: none;"><i class="fas fa-times"></i></button>
                    </div>
                </div>
            </div>
        </header>

        <section class="songs-section">
            <div id="songGrid" class="song-grid"></div>
            <div id="noResults" class="no-results" style="display: none;">
                <i class="fas fa-music"></i>
                <p>Nothing was found.</p>
            </div>
        </section>

        <footer class="footer">
            <div class="footer-content">
                <img src="logo.jpg" alt="YELO" class="footer-logo" loading="lazy">
                <span>A subdivision of Lumen Technologies Co. (LTC)</span>
            </div>
            <a href="https://lt-c.iddns.ir" class="back-link">
                <i class="fas fa-arrow-right"></i> back to LTC HUB
            </a>
        </footer>
    </div>

    <script>
        (function() {
            'use strict';

            const songGrid = document.getElementById('songGrid');
            const searchInput = document.getElementById('searchInput');
            const clearBtn = document.getElementById('clearSearch');
            const noResults = document.getElementById('noResults');

            let allSongs = [];
            let currentFilter = '';

            function escapeHTML(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            async function loadSongs() {
                try {
                    const resp = await fetch('./art.json');
                    if (!resp.ok) throw new Error('art.json not found.');
                    allSongs = await resp.json();
                    if (!allSongs.length) throw new Error('No songs available.');
                    renderSongs(allSongs);
                } catch (err) {
                    console.error(err);
                    songGrid.innerHTML = `
                        <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);font-family:var(--font-family);">
                            <i class="fas fa-exclamation-triangle" style="font-size:2rem;margin-bottom:12px;display:block;font-family:'Font Awesome 6 Free','Font Awesome 6 Brands',sans-serif;font-weight:900;"></i>
                            <p>Error loading songs.</p>
                        </div>
                    `;
                }
            }

            function renderSongs(songs) {
                if (!songs || !songs.length) {
                    songGrid.innerHTML = '';
                    noResults.style.display = 'block';
                    return;
                }
                noResults.style.display = 'none';

                let html = '';
                songs.forEach(song => {
                    html += `
                        <a href="./song.html?id=${song.id}" class="song-card">
                            <img src="${escapeHTML(song.cover)}" alt="${escapeHTML(song.title)}" class="song-card-cover" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22%3E%3Crect fill=%22%236c6c70%22 width=%22200%22 height=%22200%22/%3E%3Ctext x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23fff%22 font-size=%2240%22 font-family=%22sans-serif%22%3E🎵%3C/text%3E%3C/svg%3E'">
                            <div class="song-card-info">
                                <div class="song-card-title">${escapeHTML(song.title)}</div>
                                <div class="song-card-artist">${escapeHTML(song.artist)}</div>
                                ${song.hasMusic ? `<span class="song-card-badge">music</span>` : ''}
                                ${song.hasVideo ? `<span class="song-card-badge">video</span>` : ''}
                            </div>
                        </a>
                    `;
                });
                songGrid.innerHTML = html;
            }

            function filterSongs(query) {
                const q = query.trim().toLowerCase();
                if (!q) {
                    renderSongs(allSongs);
                    currentFilter = '';
                    clearBtn.style.display = 'none';
                    return;
                }
                currentFilter = q;
                clearBtn.style.display = 'block';
                const filtered = allSongs.filter(song =>
                    song.title.toLowerCase().includes(q) ||
                    song.artist.toLowerCase().includes(q)
                );
                renderSongs(filtered);
            }

            // ===== Events =====
            searchInput.addEventListener('input', function() {
                filterSongs(this.value);
            });

            clearBtn.addEventListener('click', function() {
                searchInput.value = '';
                filterSongs('');
                searchInput.focus();
            });

            // ===== Load =====
            loadSongs();
        })();
    </script>
</body>
</html>
