<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>فراوا — پخش آهنگ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ===== Reset & Base ===== */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #11111a;
            --bg-card: #181825;
            --bg-surface: #22223b;
            --bg-elevated: #2a2a45;
            --text-primary: #f1f1f6;
            --text-secondary: #b0b0c8;
            --text-muted: #6b6b85;
            --accent: #7c3aed;
            --accent-light: #a78bfa;
            --accent-glow: rgba(124, 58, 237, 0.25);
            --accent-gradient: linear-gradient(135deg, #7c3aed 0%, #a78bfa 100%);
            --border-subtle: rgba(255, 255, 255, 0.06);
            --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.6);
            --shadow-glow: 0 0 60px rgba(124, 58, 237, 0.15);
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 12px;
            --radius-full: 9999px;
            --transition-smooth: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 16px;
            background-image: radial-gradient(ellipse at 30% 50%, rgba(124, 58, 237, 0.06) 0%, transparent 70%);
        }

        /* ===== Container ===== */
        .player-container {
            width: 100%;
            max-width: 1200px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* ===== Back Nav ===== */
        .back-nav {
            margin-bottom: 24px;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: var(--radius-full);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-subtle);
            transition: var(--transition-smooth);
            backdrop-filter: blur(4px);
        }
        .back-btn:hover {
            color: var(--accent-light);
            background: var(--accent-glow);
            border-color: var(--accent);
            transform: translateX(-4px);
        }
        .back-btn i {
            font-size: 0.85rem;
        }

        /* ===== Layout ===== */
        .player-layout {
            display: flex;
            flex-direction: column;
            gap: 32px;
            flex: 1;
        }

        @media (min-width: 900px) {
            .player-layout {
                flex-direction: row;
                align-items: center;
                gap: 48px;
            }
            .player-left {
                flex: 1.2;
                order: 1;
                min-width: 0;
                display: flex;
                flex-direction: column;
                gap: 24px;
            }
            .player-right {
                flex: 1;
                order: 2;
                display: flex;
                justify-content: center;
                align-items: center;
            }
        }

        @media (max-width: 899px) {
            .player-layout {
                flex-direction: column;
                align-items: center;
                gap: 24px;
            }
            .player-left {
                order: 2;
                width: 100%;
            }
            .player-right {
                order: 1;
                width: 100%;
                margin-bottom: 4px;
            }
        }

        /* ===== Cover ===== */
        .cover-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }
        .cover-wrapper::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(124, 58, 237, 0.15) 0%, transparent 70%);
            border-radius: var(--radius-lg);
            pointer-events: none;
            opacity: 0.6;
        }

        .cover-large {
            width: 100%;
            max-width: 420px;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: var(--radius-lg);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.04), var(--shadow-glow);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.4s ease;
            background: var(--bg-surface);
            position: relative;
            z-index: 1;
        }
        .cover-wrapper:hover .cover-large {
            transform: scale(1.02);
            box-shadow: 0 28px 72px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(255, 255, 255, 0.06), var(--shadow-glow);
        }

        /* ===== Song Info ===== */
        .song-info {
            text-align: center;
            padding: 0 4px;
        }
        .song-info .song-title {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 2px;
            line-height: 1.2;
        }
        .song-info .song-artist {
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .song-info .song-artist i {
            color: var(--accent-light);
            margin-left: 6px;
            font-size: 0.85rem;
            -webkit-text-fill-color: initial;
        }
        .song-info .song-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .song-info .song-meta i {
            color: var(--accent-light);
            opacity: 0.7;
        }
        .song-info .song-description {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-top: 12px;
            line-height: 1.8;
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
            opacity: 0.85;
        }

        @media (max-width: 500px) {
            .song-info .song-title {
                font-size: 1.5rem;
            }
            .song-info .song-artist {
                font-size: 1rem;
            }
            .song-info .song-description {
                font-size: 0.85rem;
            }
        }

        /* ===== Custom Player (Spotify‑inspired) ===== */
        .custom-player {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            padding: 20px 24px 18px;
            border: 1px solid var(--border-subtle);
            backdrop-filter: blur(8px);
            box-shadow: var(--shadow-soft), inset 0 1px 0 rgba(255, 255, 255, 0.03);
            transition: var(--transition-smooth);
        }
        .custom-player:hover {
            border-color: rgba(124, 58, 237, 0.2);
        }

        /* ===== Controls ===== */
        .player-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .ctrl-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-smooth);
            position: relative;
        }
        .ctrl-btn:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
        }
        .ctrl-btn:active {
            transform: scale(0.92);
        }

        .ctrl-btn.play-btn {
            font-size: 1.8rem;
            width: 64px;
            height: 64px;
            background: var(--accent-gradient);
            color: #fff;
            box-shadow: 0 8px 28px rgba(124, 58, 237, 0.35);
            transition: var(--transition-smooth);
        }
        .ctrl-btn.play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 36px rgba(124, 58, 237, 0.5);
            background: var(--accent-gradient);
            color: #fff;
        }
        .ctrl-btn.play-btn:active {
            transform: scale(0.94);
        }

        .ctrl-btn i {
            line-height: 1;
        }

        /* ===== Progress Bar ===== */
        .progress-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 6px 0 12px;
            direction: ltr;
        }
        .progress-time {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-muted);
            min-width: 44px;
            font-variant-numeric: tabular-nums;
            user-select: none;
            letter-spacing: 0.3px;
        }

        .progress-bar {
            flex: 1;
            height: 4px;
            background: var(--bg-surface);
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            touch-action: none;
            transition: height 0.2s ease;
            overflow: visible;
        }
        .progress-bar:hover {
            height: 6px;
        }
        .progress-bar:hover .progress-fill {
            background: var(--accent-gradient);
        }

        .progress-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: var(--accent-gradient);
            border-radius: 4px;
            width: 0%;
            pointer-events: none;
            transition: width 0.05s linear;
        }

        /* ===== Custom Thumb on Progress (via pseudo) ===== */
        .progress-bar::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 0%;
            width: 14px;
            height: 14px;
            background: #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
            pointer-events: none;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.2s;
            z-index: 2;
        }
        .progress-bar.dragging::after,
        .progress-bar:hover::after {
            transform: translate(-50%, -50%) scale(1);
            background: var(--accent-light);
        }
        .progress-bar.dragging::after {
            transform: translate(-50%, -50%) scale(1.2);
            background: #fff;
        }

        /* ===== Volume ===== */
        .volume-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 6px;
            direction: ltr;
        }
        .volume-control i {
            color: var(--text-muted);
            font-size: 0.9rem;
            transition: var(--transition-smooth);
        }
        .volume-control i:hover {
            color: var(--text-secondary);
        }

        .volume-slider {
            width: 120px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: var(--bg-surface);
            border-radius: 4px;
            outline: none;
            touch-action: none;
            transition: height 0.2s;
        }
        .volume-slider:hover {
            height: 6px;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent-gradient);
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(124, 58, 237, 0.3);
            transition: var(--transition-smooth);
        }
        .volume-slider::-webkit-slider-thumb:hover {
            transform: scale(1.15);
        }
        .volume-slider::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent-gradient);
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 8px rgba(124, 58, 237, 0.3);
        }

        /* ===== Video ===== */
        .video-wrapper {
            width: 100%;
            margin-top: 4px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            background: #000;
            box-shadow: var(--shadow-soft);
            border: 1px solid var(--border-subtle);
        }
        .video-wrapper video {
            width: 100%;
            display: block;
            max-height: 400px;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            background: #0a0a0f;
        }
        .video-only {
            margin-top: 0;
        }

        @media (max-width: 899px) {
            .video-wrapper video {
                max-height: 300px;
            }
        }
        @media (max-width: 500px) {
            .video-wrapper video {
                max-height: 220px;
            }
        }

        /* ===== Error ===== */
        .error-msg {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-muted);
            width: 100%;
        }
        .error-msg i {
            font-size: 3.2rem;
            margin-bottom: 16px;
            opacity: 0.4;
            color: var(--accent-light);
        }
        .error-msg p {
            font-size: 1.05rem;
            max-width: 400px;
            margin: 0 auto;
        }

        /* ===== Responsive fine-tune ===== */
        @media (max-width: 899px) {
            .cover-large {
                max-width: 320px;
            }
            .custom-player {
                padding: 16px 18px 14px;
            }
            .ctrl-btn {
                width: 38px;
                height: 38px;
                font-size: 1rem;
            }
            .ctrl-btn.play-btn {
                width: 56px;
                height: 56px;
                font-size: 1.6rem;
            }
            .volume-slider {
                width: 90px;
            }
            .progress-bar {
                height: 6px;
            }
            .progress-bar::after {
                width: 16px;
                height: 16px;
            }
        }

        @media (max-width: 500px) {
            .cover-large {
                max-width: 240px;
            }
            .custom-player {
                padding: 12px 14px 12px;
                border-radius: var(--radius-sm);
            }
            .ctrl-btn {
                width: 34px;
                height: 34px;
                font-size: 0.85rem;
            }
            .ctrl-btn.play-btn {
                width: 48px;
                height: 48px;
                font-size: 1.4rem;
            }
            .progress-time {
                font-size: 0.7rem;
                min-width: 36px;
            }
            .volume-slider {
                width: 60px;
            }
            .progress-bar {
                height: 8px;
            }
            .progress-bar::after {
                width: 18px;
                height: 18px;
            }
            .volume-slider::-webkit-slider-thumb {
                width: 20px;
                height: 20px;
            }
            .volume-slider::-moz-range-thumb {
                width: 20px;
                height: 20px;
            }
            .back-btn {
                font-size: 0.8rem;
                padding: 6px 12px;
            }
            .player-controls {
                gap: 4px;
            }
        }

        /* ===== Scrollbar ===== */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--bg-surface);
            border-radius: 6px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        /* ===== Utility ===== */
        .text-gradient {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body>
    <div class="player-container">
        <nav class="back-nav">
            <a href="./index.html" class="back-btn">
                <i class="fas fa-arrow-right"></i> بازگشت به لیست
            </a>
        </nav>

        <div id="songContent" class="player-layout">
            <!-- محتوای داینامیک توسط JS -->
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            const songContent = document.getElementById('songContent');
            let allSongs = [];
            let currentSongIndex = 0;
            let currentSong = null;
            let audio = null;
            let isPlaying = false;

            function escapeHTML(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            function getQueryParam(param) {
                return new URLSearchParams(window.location.search).get(param);
            }

            function formatTime(seconds) {
                if (isNaN(seconds) || !isFinite(seconds) || seconds < 0) return '0:00';
                const m = Math.floor(seconds / 60);
                const s = Math.floor(seconds % 60);
                return m + ':' + (s < 10 ? '0' : '') + s;
            }

            async function loadSongs() {
                try {
                    const resp = await fetch('./art.json');
                    if (!resp.ok) throw new Error('فایل art.json یافت نشد.');
                    allSongs = await resp.json();
                    if (!allSongs.length) throw new Error('هیچ آهنگی وجود ندارد.');

                    const idParam = getQueryParam('id');
                    let id = parseInt(idParam, 10);
                    if (isNaN(id)) id = allSongs[0].id;

                    const index = allSongs.findIndex(s => s.id === id);
                    currentSongIndex = (index === -1) ? 0 : index;
                    renderSong(currentSongIndex);
                } catch (err) {
                    console.error(err);
                    showError('خطا در بارگذاری اطلاعات آهنگ.');
                }
            }

            function renderSong(index) {
                if (!allSongs.length) return;
                currentSong = allSongs[index];
                if (!currentSong) return;

                const newUrl = `./song.html?id=${currentSong.id}`;
                window.history.replaceState({}, '', newUrl);

                let leftHtml = `
                    <div class="player-left">
                        <div class="song-info">
                            <h1 class="song-title">${escapeHTML(currentSong.title)}</h1>
                            <p class="song-artist"><i class="fas fa-microphone-alt"></i> ${escapeHTML(currentSong.artist)}</p>
                            ${currentSong.releaseDate ? `<div class="song-meta"><i class="fas fa-calendar-alt"></i> ${escapeHTML(currentSong.releaseDate)}</div>` : ''}
                            ${currentSong.description ? `<p class="song-description">${escapeHTML(currentSong.description)}</p>` : ''}
                        </div>
                `;

                if (currentSong.hasMusic && currentSong.music) {
                    leftHtml += `
                        <div class="custom-player" id="customPlayer">
                            <div class="player-controls">
                                <button class="ctrl-btn" id="prevBtn" title="قبلی"><i class="fas fa-step-backward"></i></button>
                                <button class="ctrl-btn play-btn" id="playBtn" title="پلی/مکث"><i class="fas fa-play"></i></button>
                                <button class="ctrl-btn" id="nextBtn" title="بعدی"><i class="fas fa-step-forward"></i></button>
                            </div>
                            <div class="progress-container">
                                <span class="progress-time" id="currentTime">0:00</span>
                                <div class="progress-bar" id="progressBar">
                                    <div class="progress-fill" id="progressFill"></div>
                                </div>
                                <span class="progress-time" id="totalTime">0:00</span>
                            </div>
                            <div class="volume-control">
                                <i class="fas fa-volume-up"></i>
                                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="0.8" dir="ltr">
                                <i class="fas fa-volume-down"></i>
                            </div>
                        </div>
                    `;
                }

                if (currentSong.hasVideo && currentSong.video) {
                    const videoClass = currentSong.hasMusic ? '' : 'video-only';
                    leftHtml += `
                        <div class="video-wrapper ${videoClass}">
                            <video controls playsinline>
                                <source src="${escapeHTML(currentSong.video)}" type="video/mp4">
                                مرورگر شما از پخش ویدیو پشتیبانی نمی‌کند.
                            </video>
                        </div>
                    `;
                }

                leftHtml += `</div>`;

                let rightHtml = `
                    <div class="player-right">
                        <div class="cover-wrapper">
                            <img src="${escapeHTML(currentSong.cover)}" alt="${escapeHTML(currentSong.title)}" class="cover-large" loading="lazy" onerror="this.style.display='none'">
                        </div>
                    </div>
                `;

                if (!currentSong.hasMusic && !currentSong.hasVideo) {
                    leftHtml = `
                        <div class="error-msg">
                            <i class="fas fa-ban"></i>
                            <p>محتوای قابل پخشی برای این آهنگ موجود نیست.</p>
                            <br>
                            <a href="./index.html" class="back-btn" style="display:inline-flex;margin-top:12px;">
                                <i class="fas fa-arrow-right"></i> بازگشت به صفحه اصلی
                            </a>
                        </div>
                    `;
                    rightHtml = '';
                }

                songContent.innerHTML = leftHtml + rightHtml;

                if (currentSong.hasMusic && currentSong.music) {
                    initPlayer();
                }
            }

            function initPlayer() {
                if (!currentSong) return;
                const musicSrc = currentSong.music;

                if (audio) {
                    audio.pause();
                    audio.src = '';
                }
                audio = new Audio(musicSrc);
                audio.volume = parseFloat(document.getElementById('volumeSlider')?.value || 0.8);
                audio.loop = false;

                const playBtn = document.getElementById('playBtn');
                const prevBtn = document.getElementById('prevBtn');
                const nextBtn = document.getElementById('nextBtn');
                const progressFill = document.getElementById('progressFill');
                const progressBar = document.getElementById('progressBar');
                const currentTimeSpan = document.getElementById('currentTime');
                const totalTimeSpan = document.getElementById('totalTime');
                const volumeSlider = document.getElementById('volumeSlider');

                audio.addEventListener('loadedmetadata', () => {
                    totalTimeSpan.textContent = formatTime(audio.duration);
                });

                audio.addEventListener('timeupdate', () => {
                    if (audio.duration) {
                        const percent = (audio.currentTime / audio.duration) * 100;
                        progressFill.style.width = percent + '%';
                        currentTimeSpan.textContent = formatTime(audio.currentTime);
                        // update thumb position
                        progressBar.style.setProperty('--thumb-pos', percent + '%');
                        progressBar.style.setProperty('--thumb-scale', '1');
                    }
                });

                audio.addEventListener('ended', () => {
                    playBtn.innerHTML = '<i class="fas fa-play"></i>';
                    isPlaying = false;
                    playNext();
                });

                function togglePlay() {
                    if (isPlaying) {
                        audio.pause();
                        playBtn.innerHTML = '<i class="fas fa-play"></i>';
                    } else {
                        audio.play().catch(() => {});
                        playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                    }
                    isPlaying = !isPlaying;
                }

                playBtn.addEventListener('click', togglePlay);

                function playPrev() {
                    let newIndex = currentSongIndex - 1;
                    if (newIndex < 0) newIndex = allSongs.length - 1;
                    changeSong(newIndex);
                }

                function playNext() {
                    let newIndex = currentSongIndex + 1;
                    if (newIndex >= allSongs.length) newIndex = 0;
                    changeSong(newIndex);
                }

                function changeSong(index) {
                    if (audio) { audio.pause(); audio.src = ''; }
                    isPlaying = false;
                    currentSongIndex = index;
                    renderSong(index);
                }

                prevBtn.addEventListener('click', playPrev);
                nextBtn.addEventListener('click', playNext);

                // ===== Progress dragging =====
                let isDragging = false;

                function setProgress(clientX) {
                    const rect = progressBar.getBoundingClientRect();
                    let x = clientX - rect.left;
                    // clamp
                    x = Math.max(0, Math.min(x, rect.width));
                    const percent = rect.width > 0 ? x / rect.width : 0;
                    progressFill.style.width = (percent * 100) + '%';
                    if (audio.duration) {
                        audio.currentTime = percent * audio.duration;
                    }
                    // update thumb visual
                    progressBar.style.setProperty('--thumb-pos', (percent * 100) + '%');
                }

                // Mouse
                progressBar.addEventListener('mousedown', (e) => {
                    isDragging = true;
                    progressBar.classList.add('dragging');
                    setProgress(e.clientX);
                });

                document.addEventListener('mousemove', (e) => {
                    if (isDragging) {
                        setProgress(e.clientX);
                    }
                });

                document.addEventListener('mouseup', () => {
                    if (isDragging) {
                        isDragging = false;
                        progressBar.classList.remove('dragging');
                    }
                });

                // Touch
                progressBar.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    const touch = e.touches[0];
                    isDragging = true;
                    progressBar.classList.add('dragging');
                    setProgress(touch.clientX);
                }, { passive: false });

                progressBar.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    if (isDragging) {
                        const touch = e.touches[0];
                        setProgress(touch.clientX);
                    }
                }, { passive: false });

                progressBar.addEventListener('touchend', () => {
                    isDragging = false;
                    progressBar.classList.remove('dragging');
                });

                // Volume
                volumeSlider.addEventListener('input', () => {
                    audio.volume = parseFloat(volumeSlider.value);
                });

                // Keyboard
                document.addEventListener('keydown', (e) => {
                    if (e.code === 'Space' && document.activeElement?.tagName !== 'INPUT') {
                        e.preventDefault();
                        togglePlay();
                    }
                });

                currentTimeSpan.textContent = '0:00';
                if (audio.duration) totalTimeSpan.textContent = formatTime(audio.duration);

                // init thumb
                progressBar.style.setProperty('--thumb-pos', '0%');
            }

            function showError(msg) {
                songContent.innerHTML = `
                    <div class="error-msg">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>${escapeHTML(msg)}</p>
                        <br>
                        <a href="./index.html" class="back-btn" style="display:inline-flex;margin-top:12px;">
                            <i class="fas fa-arrow-right"></i> بازگشت به صفحه اصلی
                        </a>
                    </div>
                `;
            }

            loadSongs();
        })();
    </script>
</body>
</html>
