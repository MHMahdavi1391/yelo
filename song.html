<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فراوا — پخش آهنگ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-surface: #161b22;
            --bg-card: #1c2333;
            --accent: #e6b422;
            --accent-glow: rgba(230, 180, 34, 0.25);
            --text-primary: #f0f0f0;
            --text-secondary: #b0b8c4;
            --text-muted: #6e7681;
            --border-subtle: rgba(255, 255, 255, 0.07);
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --space-xs: 0.5rem;
            --space-sm: 0.8rem;
            --space-md: 1.3rem;
            --space-lg: 2rem;
            --space-xl: 3rem;
            --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { font-size: 15px; scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: var(--space-sm);
            direction: rtl;
            line-height: 1.7;
        }

        .container {
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            padding: var(--space-sm);
        }

        /* === دکمه برگشت === */
        .back-nav {
            margin-bottom: var(--space-md);
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color var(--transition-smooth);
        }

        .back-btn:hover { color: var(--accent); }

        /* === هدر آهنگ === */
        .song-header {
            text-align: center;
            margin-bottom: var(--space-lg);
        }

        .cover-large {
            width: 100%;
            max-width: 350px;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: var(--radius-lg);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
            margin-bottom: var(--space-md);
            border: 2px solid var(--border-subtle);
            background: var(--bg-surface);
        }

        .song-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .song-artist {
            font-size: 1.1rem;
            color: var(--accent);
            font-weight: 500;
            margin-bottom: var(--space-xs);
        }

        .song-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            justify-content: center;
            gap: var(--space-sm);
            flex-wrap: wrap;
        }

        .song-description {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: var(--space-sm);
            line-height: 1.8;
        }

        /* === پخش‌کننده‌ها === */
        .player-section {
            margin-top: var(--space-lg);
        }

        .player-box {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: var(--space-md);
            margin-bottom: var(--space-sm);
        }

        .player-box h3 {
            font-size: 1rem;
            color: var(--accent);
            margin-bottom: var(--space-xs);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        audio, video {
            width: 100%;
            border-radius: var(--radius-sm);
            outline: none;
        }

        audio {
            background: var(--bg-surface);
        }

        video {
            max-height: 400px;
            background: #000;
        }

        /* === خطا === */
        .error-msg {
            text-align: center;
            padding: var(--space-xl);
            color: var(--text-muted);
        }

        .error-msg i {
            font-size: 3rem;
            margin-bottom: var(--space-sm);
            opacity: 0.5;
        }

        /* === ریسپانسیو === */
        @media (max-width: 500px) {
            .song-title { font-size: 1.3rem; }
            .song-artist { font-size: 0.95rem; }
            .cover-large { max-width: 280px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="back-nav">
            <a href="./index.html" class="back-btn">
                <i class="fas fa-arrow-right"></i> بازگشت به لیست آهنگ‌ها
            </a>
        </nav>

        <div id="songContent">
            <!-- با JS پر میشه -->
        </div>
    </div>

    <script>
        (function () {
            'use strict';

            const songContent = document.getElementById('songContent');

            function escapeHTML(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            function getQueryParam(param) {
                const params = new URLSearchParams(window.location.search);
                return params.get(param);
            }

            function showError(msg) {
                songContent.innerHTML = `
                    <div class="error-msg">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>${escapeHTML(msg)}</p>
                        <br>
                        <a href="./index.html" class="back-btn">
                            <i class="fas fa-arrow-right"></i> بازگشت به صفحه اصلی
                        </a>
                    </div>
                `;
            }

            async function loadSong() {
                const idParam = getQueryParam('id');
                if (!idParam) {
                    showError('شناسه آهنگ نامشخص است.');
                    return;
                }

                const songId = parseInt(idParam, 10);
                if (isNaN(songId)) {
                    showError('شناسه آهنگ نامعتبر است.');
                    return;
                }

                try {
                    const response = await fetch('./art.json');
                    if (!response.ok) throw new Error('فایل art.json یافت نشد.');
                    const songs = await response.json();

                    const song = songs.find(s => s.id === songId);
                    if (!song) {
                        showError('آهنگ مورد نظر یافت نشد.');
                        return;
                    }

                    renderSong(song);
                } catch (error) {
                    console.error('خطا:', error);
                    showError('خطا در بارگذاری اطلاعات آهنگ.');
                }
            }

            function renderSong(song) {
                let html = `
                    <div class="song-header">
                        <img 
                            src="${escapeHTML(song.cover)}" 
                            alt="${escapeHTML(song.title)}" 
                            class="cover-large"
                            loading="lazy"
                            onerror="this.style.display='none'"
                        >
                        <h1 class="song-title">${escapeHTML(song.title)}</h1>
                        <p class="song-artist">${escapeHTML(song.artist)}</p>
                        <div class="song-meta">
                            ${song.releaseDate ? `<span><i class="fas fa-calendar-alt"></i> ${escapeHTML(song.releaseDate)}</span>` : ''}
                        </div>
                        ${song.description ? `<p class="song-description">${escapeHTML(song.description)}</p>` : ''}
                    </div>
                `;

                // پخش‌کننده‌ها
                if (song.hasMusic && song.music) {
                    html += `
                        <div class="player-section">
                            <div class="player-box">
                                <h3><i class="fas fa-music"></i> پخش آهنگ</h3>
                                <audio controls>
                                    <source src="${escapeHTML(song.music)}" type="audio/mpeg">
                                    مرورگر شما از پخش صدا پشتیبانی نمی‌کند.
                                </audio>
                            </div>
                        </div>
                    `;
                }

                if (song.hasVideo && song.video) {
                    html += `
                        <div class="player-section">
                            <div class="player-box">
                                <h3><i class="fas fa-video"></i> موزیک ویدیو</h3>
                                <video controls playsinline>
                                    <source src="${escapeHTML(song.video)}" type="video/mp4">
                                    مرورگر شما از پخش ویدیو پشتیبانی نمی‌کند.
                                </video>
                            </div>
                        </div>
                    `;
                }

                if (!song.hasMusic && !song.hasVideo) {
                    html += `
                        <div class="error-msg" style="padding: var(--space-md);">
                            <i class="fas fa-ban"></i>
                            <p>محتوای قابل پخشی برای این آهنگ موجود نیست.</p>
                        </div>
                    `;
                }

                songContent.innerHTML = html;
            }

            loadSong();
        })();
    </script>
</body>
</html>
