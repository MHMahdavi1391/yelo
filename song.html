<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>فراوا — پخش آهنگ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* ===== Override for player page ===== */
        .player-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: var(--space-sm) var(--space-md);
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .back-nav {
            margin-bottom: var(--space-md);
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color var(--transition-smooth);
        }
        .back-btn:hover { color: var(--accent); }

        /* ===== Layout: دو ستونه در لپ‌تاپ ===== */
        .player-layout {
            display: flex;
            flex-direction: column;
            gap: var(--space-lg);
            flex: 1;
        }

        @media (min-width: 900px) {
            .player-layout {
                flex-direction: row;
                align-items: center;
                justify-content: center;
                gap: var(--space-xl);
            }
            .player-left {
                flex: 1.2;
                min-width: 0;
            }
            .player-right {
                flex: 1;
                min-width: 0;
                display: flex;
                flex-direction: column;
                gap: var(--space-md);
            }
        }

        /* ===== Cover with iOS-like glass effect ===== */
        .cover-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: var(--space-sm);
        }

        .cover-large {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: var(--radius-lg);
            box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.05);
            transition: transform 0.4s ease;
            background: var(--bg-surface);
        }

        /* iOS 26 glass effect: subtle gradient overlay + blur backdrop */
        .cover-wrapper::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(145deg, rgba(255,255,255,0.08) 0%, transparent 50%, rgba(0,0,0,0.2) 100%);
            border-radius: var(--radius-lg);
            pointer-events: none;
            opacity: 0.6;
        }

        .cover-wrapper:hover .cover-large {
            transform: scale(1.02);
        }

        /* ===== Song info ===== */
        .song-info {
            text-align: center;
        }
        .song-info .song-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 2px;
        }
        .song-info .song-artist {
            font-size: 1.2rem;
            color: var(--accent);
            font-weight: 500;
        }
        .song-info .song-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: var(--space-xs);
        }
        .song-info .song-description {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-top: var(--space-sm);
            line-height: 1.7;
        }

        /* ===== Custom Player (تمیز و مرتب) ===== */
        .custom-player {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            padding: var(--space-md) var(--space-lg);
            border: 1px solid var(--border-subtle);
            backdrop-filter: blur(4px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }

        .player-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-sm);
            margin-bottom: var(--space-sm);
        }

        .ctrl-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all var(--transition-smooth);
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ctrl-btn:hover {
            color: var(--accent);
            background: var(--accent-glow);
        }
        .ctrl-btn.active {
            color: var(--accent);
        }
        .ctrl-btn.play-btn {
            font-size: 2.2rem;
            color: var(--accent);
            background: rgba(245, 200, 66, 0.12);
            width: 64px;
            height: 64px;
        }
        .ctrl-btn.play-btn:hover {
            background: rgba(245, 200, 66, 0.25);
        }

        /* Progress bar with touch support */
        .progress-container {
            display: flex;
            align-items: center;
            gap: var(--space-xs);
            margin: var(--space-sm) 0;
        }
        .progress-time {
            font-size: 0.8rem;
            color: var(--text-muted);
            min-width: 44px;
            font-variant-numeric: tabular-nums;
            user-select: none;
        }
        .progress-bar {
            flex: 1;
            height: 6px;
            background: var(--bg-surface);
            border-radius: 6px;
            cursor: pointer;
            position: relative;
            touch-action: none;
            transition: height 0.2s;
        }
        .progress-bar:hover { height: 8px; }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: var(--accent-gradient);
            border-radius: 6px;
            transition: width 0.05s linear;
            pointer-events: none;
        }

        /* Volume control */
        .volume-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: var(--space-xs);
        }
        .volume-control i {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .volume-slider {
            width: 120px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: var(--bg-surface);
            border-radius: 4px;
            outline: none;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
        }
        .volume-slider::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            border: none;
        }

        /* ===== Video ===== */
        .video-wrapper {
            margin-top: var(--space-md);
        }
        .video-wrapper video {
            width: 100%;
            border-radius: var(--radius-sm);
            background: #000;
            max-height: 400px;
        }

        /* ===== Error ===== */
        .error-msg {
            text-align: center;
            padding: var(--space-xl);
            color: var(--text-muted);
        }
        .error-msg i { font-size: 3rem; margin-bottom: var(--space-sm); opacity: 0.5; }

        /* ===== Responsive for mobile (cover top, player bottom) ===== */
        @media (max-width: 899px) {
            .player-layout {
                flex-direction: column;
                align-items: center;
            }
            .player-left, .player-right {
                width: 100%;
            }
            .cover-large {
                max-width: 300px;
            }
            .song-info .song-title { font-size: 1.4rem; }
            .song-info .song-artist { font-size: 1rem; }
            .ctrl-btn { width: 38px; height: 38px; font-size: 1rem; }
            .ctrl-btn.play-btn { width: 56px; height: 56px; font-size: 1.8rem; }
            .custom-player { padding: var(--space-md); }
            .volume-slider { width: 80px; }
        }

        @media (max-width: 500px) {
            .cover-large { max-width: 220px; }
            .song-info .song-title { font-size: 1.2rem; }
            .ctrl-btn { width: 34px; height: 34px; font-size: 0.9rem; }
            .ctrl-btn.play-btn { width: 48px; height: 48px; font-size: 1.5rem; }
            .progress-time { font-size: 0.7rem; min-width: 36px; }
            .volume-slider { width: 60px; }
        }
    </style>
</head>
<body>
    <div class="player-container">
        <nav class="back-nav">
            <a href="./index.html" class="back-btn">
                <i class="fas fa-arrow-right"></i> بازگشت به لیست آهنگ‌ها
            </a>
        </nav>

        <div id="songContent" class="player-layout">
            <!-- محتوای داینامیک توسط JS -->
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            const songContent = document.getElementById('songContent');
            let allSongs = [];
            let currentSongIndex = 0;
            let currentSong = null;
            let audio = null;
            let isPlaying = false;
            let shuffle = false;
            let repeat = false;

            // ===== Helpers =====
            function escapeHTML(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            function getQueryParam(param) {
                return new URLSearchParams(window.location.search).get(param);
            }

            function formatTime(seconds) {
                if (isNaN(seconds) || !isFinite(seconds)) return '0:00';
                const m = Math.floor(seconds / 60);
                const s = Math.floor(seconds % 60);
                return m + ':' + (s < 10 ? '0' : '') + s;
            }

            // ===== بارگذاری آهنگ‌ها =====
            async function loadSongs() {
                try {
                    const resp = await fetch('./art.json');
                    if (!resp.ok) throw new Error('فایل art.json یافت نشد.');
                    allSongs = await resp.json();
                    if (!allSongs.length) throw new Error('هیچ آهنگی وجود ندارد.');

                    const idParam = getQueryParam('id');
                    let id = parseInt(idParam, 10);
                    if (isNaN(id)) id = allSongs[0].id;

                    const index = allSongs.findIndex(s => s.id === id);
                    currentSongIndex = (index === -1) ? 0 : index;
                    renderSong(currentSongIndex);
                } catch (err) {
                    console.error(err);
                    showError('خطا در بارگذاری اطلاعات آهنگ.');
                }
            }

            // ===== نمایش آهنگ (با چینش جدید) =====
            function renderSong(index) {
                if (!allSongs.length) return;
                currentSong = allSongs[index];
                if (!currentSong) return;

                // بروزرسانی URL
                const newUrl = `./song.html?id=${currentSong.id}`;
                window.history.replaceState({}, '', newUrl);

                // ساختار دوتکه: سمت چپ (کاور + اطلاعات) و سمت راست (پلیر)
                let html = `
                    <div class="player-left">
                        <div class="cover-wrapper">
                            <img src="${escapeHTML(currentSong.cover)}" alt="${escapeHTML(currentSong.title)}" class="cover-large" loading="lazy" onerror="this.style.display='none'">
                        </div>
                        <div class="song-info">
                            <h1 class="song-title">${escapeHTML(currentSong.title)}</h1>
                            <p class="song-artist">${escapeHTML(currentSong.artist)}</p>
                            ${currentSong.releaseDate ? `<div class="song-meta"><i class="fas fa-calendar-alt"></i> ${escapeHTML(currentSong.releaseDate)}</div>` : ''}
                            ${currentSong.description ? `<p class="song-description">${escapeHTML(currentSong.description)}</p>` : ''}
                        </div>
                    </div>
                    <div class="player-right">
                `;

                // پلیر صوتی
                if (currentSong.hasMusic && currentSong.music) {
                    html += `
                        <div class="custom-player" id="customPlayer">
                            <div class="player-controls">
                                <button class="ctrl-btn" id="shuffleBtn" title="Shuffle"><i class="fas fa-random"></i></button>
                                <button class="ctrl-btn" id="prevBtn" title="Previous"><i class="fas fa-step-backward"></i></button>
                                <button class="ctrl-btn play-btn" id="playBtn" title="Play/Pause"><i class="fas fa-play"></i></button>
                                <button class="ctrl-btn" id="nextBtn" title="Next"><i class="fas fa-step-forward"></i></button>
                                <button class="ctrl-btn" id="repeatBtn" title="Repeat"><i class="fas fa-redo"></i></button>
                            </div>
                            <div class="progress-container">
                                <span class="progress-time" id="currentTime">0:00</span>
                                <div class="progress-bar" id="progressBar">
                                    <div class="progress-fill" id="progressFill"></div>
                                </div>
                                <span class="progress-time" id="totalTime">0:00</span>
                            </div>
                            <div class="volume-control">
                                <i class="fas fa-volume-down"></i>
                                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="0.8">
                                <i class="fas fa-volume-up"></i>
                            </div>
                        </div>
                    `;
                }

                // ویدیو
                if (currentSong.hasVideo && currentSong.video) {
                    html += `
                        <div class="video-wrapper">
                            <video controls playsinline>
                                <source src="${escapeHTML(currentSong.video)}" type="video/mp4">
                                مرورگر شما از پخش ویدیو پشتیبانی نمی‌کند.
                            </video>
                        </div>
                    `;
                }

                if (!currentSong.hasMusic && !currentSong.hasVideo) {
                    html += `
                        <div class="error-msg">
                            <i class="fas fa-ban"></i>
                            <p>محتوای قابل پخشی برای این آهنگ موجود نیست.</p>
                        </div>
                    `;
                }

                html += `</div>`; // بستن player-right
                songContent.innerHTML = html;

                if (currentSong.hasMusic && currentSong.music) {
                    initPlayer();
                }
            }

            // ===== مقداردهی پلیر با پشتیبانی از لمس =====
            function initPlayer() {
                if (!currentSong) return;
                const musicSrc = currentSong.music;

                if (audio) {
                    audio.pause();
                    audio.src = '';
                }
                audio = new Audio(musicSrc);
                audio.volume = parseFloat(document.getElementById('volumeSlider')?.value || 0.8);
                audio.loop = false;

                const playBtn = document.getElementById('playBtn');
                const prevBtn = document.getElementById('prevBtn');
                const nextBtn = document.getElementById('nextBtn');
                const shuffleBtn = document.getElementById('shuffleBtn');
                const repeatBtn = document.getElementById('repeatBtn');
                const progressFill = document.getElementById('progressFill');
                const progressBar = document.getElementById('progressBar');
                const currentTimeSpan = document.getElementById('currentTime');
                const totalTimeSpan = document.getElementById('totalTime');
                const volumeSlider = document.getElementById('volumeSlider');

                // ===== رویدادهای صوتی =====
                audio.addEventListener('loadedmetadata', () => {
                    totalTimeSpan.textContent = formatTime(audio.duration);
                });

                audio.addEventListener('timeupdate', () => {
                    const percent = (audio.currentTime / audio.duration) * 100;
                    progressFill.style.width = percent + '%';
                    currentTimeSpan.textContent = formatTime(audio.currentTime);
                });

                audio.addEventListener('ended', () => {
                    if (repeat) {
                        audio.currentTime = 0;
                        audio.play().catch(() => {});
                    } else {
                        playBtn.innerHTML = '<i class="fas fa-play"></i>';
                        isPlaying = false;
                        playNext();
                    }
                });

                // ===== Play/Pause =====
                function togglePlay() {
                    if (isPlaying) {
                        audio.pause();
                        playBtn.innerHTML = '<i class="fas fa-play"></i>';
                    } else {
                        audio.play().catch(() => {});
                        playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                    }
                    isPlaying = !isPlaying;
                }

                playBtn.addEventListener('click', togglePlay);

                // ===== قبلی/بعدی =====
                function playPrev() {
                    let newIndex = currentSongIndex - 1;
                    if (newIndex < 0) newIndex = allSongs.length - 1;
                    changeSong(newIndex);
                }

                function playNext() {
                    let newIndex = currentSongIndex + 1;
                    if (newIndex >= allSongs.length) newIndex = 0;
                    changeSong(newIndex);
                }

                function changeSong(index) {
                    if (audio) { audio.pause(); audio.src = ''; }
                    isPlaying = false;
                    currentSongIndex = index;
                    renderSong(index);
                }

                prevBtn.addEventListener('click', playPrev);
                nextBtn.addEventListener('click', playNext);

                // ===== Shuffle & Repeat =====
                shuffleBtn.addEventListener('click', () => {
                    shuffle = !shuffle;
                    shuffleBtn.classList.toggle('active', shuffle);
                });
                repeatBtn.addEventListener('click', () => {
                    repeat = !repeat;
                    repeatBtn.classList.toggle('active', repeat);
                });

                // ===== نوار پیشرفت با پشتیبانی از ماوس و لمس =====
                let isDragging = false;

                function setProgress(e) {
                    const rect = progressBar.getBoundingClientRect();
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const x = clientX - rect.left;
                    const percent = Math.min(Math.max(x / rect.width, 0), 1);
                    progressFill.style.width = (percent * 100) + '%';
                    if (audio.duration) {
                        audio.currentTime = percent * audio.duration;
                    }
                }

                progressBar.addEventListener('mousedown', (e) => {
                    isDragging = true;
                    setProgress(e);
                });

                document.addEventListener('mousemove', (e) => {
                    if (isDragging) {
                        setProgress(e);
                    }
                });

                document.addEventListener('mouseup', () => {
                    isDragging = false;
                });

                // پشتیبانی از لمس
                progressBar.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    setProgress(e);
                }, { passive: false });

                progressBar.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    setProgress(e);
                }, { passive: false });

                progressBar.addEventListener('touchend', (e) => {
                    // هیچ کاری لازم نیست
                });

                // ===== کنترل صدا =====
                volumeSlider.addEventListener('input', () => {
                    audio.volume = parseFloat(volumeSlider.value);
                });

                // ===== کیبورد =====
                document.addEventListener('keydown', (e) => {
                    if (e.code === 'Space' && document.activeElement?.tagName !== 'INPUT') {
                        e.preventDefault();
                        togglePlay();
                    }
                });

                // مقداردهی اولیه
                currentTimeSpan.textContent = '0:00';
                if (audio.duration) totalTimeSpan.textContent = formatTime(audio.duration);
            }

            // ===== نمایش خطا =====
            function showError(msg) {
                songContent.innerHTML = `
                    <div class="error-msg" style="width:100%;">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>${escapeHTML(msg)}</p>
                        <br>
                        <a href="./index.html" class="back-btn">
                            <i class="fas fa-arrow-right"></i> بازگشت به صفحه اصلی
                        </a>
                    </div>
                `;
            }

            // ===== شروع =====
            loadSongs();
        })();
    </script>
</body>
</html>
