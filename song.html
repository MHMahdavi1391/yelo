<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>YELO Music - Playing</title>

  <!-- ===== Favicon ===== -->
  <link rel="icon" type="image/jpeg" href="logo.jpg">
  <link rel="apple-touch-icon" href="logo.jpg">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="player-container">
  <div class="page-logo">
    <img src="logo.jpg" alt="YELO" loading="lazy">
  </div>

  <nav class="back-nav">
    <a href="./index.html" class="back-btn">
      <i class="fas fa-arrow-left"></i> Back
    </a>
  </nav>

  <div id="songContent" class="player-layout">
    <!-- dynamic content -->
  </div>
</div>

<script>
  (function() {
    'use strict';

    const songContent = document.getElementById('songContent');
    let allSongs = [];
    let currentSongIndex = 0;
    let currentSong = null;
    let audio = null;
    let isPlaying = false;
    let loopEnabled = false;
    let isDragging = false;

    function updateMediaSession(song) {
      if (!song) return;
      if ('mediaSession' in navigator) {
        navigator.mediaSession.metadata = new MediaMetadata({
          title: song.title || 'Unknown Title',
          artist: song.artist || 'Unknown Artist',
          album: song.album || 'Album',
          artwork: [
            { src: song.cover || '', sizes: '512x512', type: 'image/jpeg' },
            { src: song.cover || '', sizes: '256x256', type: 'image/jpeg' },
          ]
        });

        navigator.mediaSession.setActionHandler('play', () => {
          if (audio) {
            audio.play().catch(() => {});
            isPlaying = true;
            updatePlayButton();
            if ('mediaSession' in navigator) {
              navigator.mediaSession.playbackState = 'playing';
            }
          }
        });
        navigator.mediaSession.setActionHandler('pause', () => {
          if (audio) {
            audio.pause();
            isPlaying = false;
            updatePlayButton();
            if ('mediaSession' in navigator) {
              navigator.mediaSession.playbackState = 'paused';
            }
          }
        });
        navigator.mediaSession.setActionHandler('previoustrack', () => {
          playPrev();
        });
        navigator.mediaSession.setActionHandler('nexttrack', () => {
          playNext();
        });
        navigator.mediaSession.setActionHandler('seekto', (details) => {
          if (audio && details.seekTime !== undefined) {
            audio.currentTime = details.seekTime;
          }
        });
      }
    }

    function updatePlayButton() {
      const playBtn = document.getElementById('playBtn');
      if (playBtn) {
        playBtn.innerHTML = isPlaying ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>';
      }
      if ('mediaSession' in navigator) {
        navigator.mediaSession.playbackState = isPlaying ? 'playing' : 'paused';
      }
    }

    function escapeHTML(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function getQueryParam(param) {
      return new URLSearchParams(window.location.search).get(param);
    }

    function formatTime(seconds) {
      if (isNaN(seconds) || !isFinite(seconds) || seconds < 0) return '0:00';
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      return m + ':' + (s < 10 ? '0' : '') + s;
    }

    async function loadSongs() {
      try {
        const resp = await fetch('./art.json');
        if (!resp.ok) throw new Error('art.json not found.');
        allSongs = await resp.json();
        if (!allSongs.length) throw new Error('No songs available.');

        const idParam = getQueryParam('id');
        let id = parseInt(idParam, 10);
        if (isNaN(id)) id = allSongs[0].id;

        const index = allSongs.findIndex(s => s.id === id);
        currentSongIndex = (index === -1) ? 0 : index;
        renderSong(currentSongIndex);
      } catch (err) {
        console.error(err);
        showError('Failed to load song data.');
      }
    }

    function renderSong(index) {
      if (!allSongs.length) return;
      currentSong = allSongs[index];
      if (!currentSong) return;

      const newUrl = `./song.html?id=${currentSong.id}`;
      window.history.replaceState({}, '', newUrl);

      updateMediaSession(currentSong);

      let leftHtml = `
        <div class="player-left">
          <div class="song-info">
            <h1 class="song-title">${escapeHTML(currentSong.title)}</h1>
            <p class="song-artist">${escapeHTML(currentSong.artist)}</p>
            ${currentSong.description ? `<p class="song-desc">${escapeHTML(currentSong.description)}</p>` : ''}
          </div>
      `;

      if (currentSong.hasMusic && currentSong.music) {
        leftHtml += `
          <div class="custom-player" id="customPlayer">
            <div class="progress-container">
              <span class="progress-time" id="currentTime">0:00</span>
              <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
              </div>
              <span class="progress-time" id="totalTime">0:00</span>
            </div>
            <div class="player-controls">
              <button class="ctrl-btn" id="prevBtn"><i class="fas fa-step-backward"></i></button>
              <button class="ctrl-btn play-btn" id="playBtn"><i class="fas fa-play"></i></button>
              <button class="ctrl-btn" id="nextBtn"><i class="fas fa-step-forward"></i></button>
            </div>
            <div class="volume-control">
              <i class="fas fa-volume-down"></i>
              <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="0.8" />
              <i class="fas fa-volume-up"></i>
            </div>
            <div class="action-bar">
              <a href="${escapeHTML(currentSong.music)}" download class="action-btn" id="downloadBtn">
                <i class="fas fa-download"></i> Download
              </a>
              <button class="action-btn" id="loopBtn">
                <i class="fas fa-repeat"></i> Loop
              </button>
            </div>
          </div>
        `;
      }

      if (currentSong.hasVideo && currentSong.video) {
        leftHtml += `
          <div class="video-wrapper">
            <video controls playsinline>
              <source src="${escapeHTML(currentSong.video)}" type="video/mp4">
            </video>
          </div>
        `;
      }

      leftHtml += `</div>`;

      let rightHtml = `
        <div class="player-right">
          <div class="cover-wrapper">
            <img src="${escapeHTML(currentSong.cover)}" alt="${escapeHTML(currentSong.title)}" class="cover-large" loading="lazy" onerror="this.style.display='none'">
          </div>
        </div>
      `;

      if (!currentSong.hasMusic && !currentSong.hasVideo) {
        leftHtml = `
          <div class="error-msg">
            <i class="fas fa-ban"></i>
            <p>No playable content available.</p>
            <br>
            <a href="./index.html" class="back-btn" style="display:inline-flex;margin-top:12px;">
              <i class="fas fa-arrow-left"></i> Back
            </a>
          </div>
        `;
        rightHtml = '';
      }

      songContent.innerHTML = leftHtml + rightHtml;

      if (currentSong.hasMusic && currentSong.music) {
        initPlayer();
      }
    }

    function initPlayer() {
      if (!currentSong) return;
      const musicSrc = currentSong.music;

      if (audio) {
        audio.pause();
        audio.src = '';
      }
      audio = new Audio(musicSrc);
      audio.volume = parseFloat(document.getElementById('volumeSlider')?.value || 0.8);
      audio.loop = false;

      const playBtn = document.getElementById('playBtn');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const progressFill = document.getElementById('progressFill');
      const progressBar = document.getElementById('progressBar');
      const currentTimeSpan = document.getElementById('currentTime');
      const totalTimeSpan = document.getElementById('totalTime');
      const volumeSlider = document.getElementById('volumeSlider');
      const loopBtn = document.getElementById('loopBtn');

      function updateLoopUI() {
        if (loopBtn) {
          if (loopEnabled) {
            loopBtn.classList.add('loop-active');
            loopBtn.innerHTML = '<i class="fas fa-repeat"></i> Loop';
          } else {
            loopBtn.classList.remove('loop-active');
            loopBtn.innerHTML = '<i class="fas fa-repeat"></i> Loop';
          }
        }
      }
      updateLoopUI();

      loopBtn?.addEventListener('click', function(e) {
        e.preventDefault();
        loopEnabled = !loopEnabled;
        updateLoopUI();
      });

      function updateThumb(percent) {
        progressBar.style.setProperty('--thumb-pos', percent + '%');
      }

      audio.addEventListener('loadedmetadata', () => {
        totalTimeSpan.textContent = formatTime(audio.duration);
      });

      audio.addEventListener('timeupdate', () => {
        if (audio.duration) {
          const percent = (audio.currentTime / audio.duration) * 100;
          progressFill.style.width = percent + '%';
          currentTimeSpan.textContent = formatTime(audio.currentTime);
          updateThumb(percent);
        }
      });

      audio.addEventListener('ended', () => {
        if (loopEnabled) {
          audio.currentTime = 0;
          audio.play().catch(() => {});
          isPlaying = true;
          updatePlayButton();
        } else {
          isPlaying = false;
          updatePlayButton();
          playNext();
        }
      });

      function togglePlay() {
        if (isPlaying) {
          audio.pause();
          isPlaying = false;
        } else {
          audio.play().catch(() => {});
          isPlaying = true;
        }
        updatePlayButton();
      }

      playBtn.addEventListener('click', togglePlay);

      function playPrev() {
        let newIndex = currentSongIndex - 1;
        if (newIndex < 0) newIndex = allSongs.length - 1;
        changeSong(newIndex);
      }

      function playNext() {
        let newIndex = currentSongIndex + 1;
        if (newIndex >= allSongs.length) newIndex = 0;
        changeSong(newIndex);
      }

      function changeSong(index) {
        if (audio) { audio.pause(); audio.src = ''; }
        isPlaying = false;
        currentSongIndex = index;
        renderSong(index);
        setTimeout(() => {
          if (audio) {
            audio.play().catch(() => {});
            isPlaying = true;
            updatePlayButton();
          }
        }, 100);
      }

      prevBtn.addEventListener('click', playPrev);
      nextBtn.addEventListener('click', playNext);

      // ===== Progress dragging (Touch & Mouse) =====
      function setProgress(clientX) {
        const rect = progressBar.getBoundingClientRect();
        let x = clientX - rect.left;
        x = Math.max(0, Math.min(x, rect.width));
        const percent = rect.width > 0 ? x / rect.width : 0;
        progressFill.style.width = (percent * 100) + '%';
        if (audio.duration) {
          audio.currentTime = percent * audio.duration;
        }
        updateThumb(percent * 100);
      }

      progressBar.addEventListener('mousedown', (e) => {
        isDragging = true;
        progressBar.classList.add('dragging');
        setProgress(e.clientX);
      });

      document.addEventListener('mousemove', (e) => {
        if (isDragging) setProgress(e.clientX);
      });

      document.addEventListener('mouseup', () => {
        if (isDragging) {
          isDragging = false;
          progressBar.classList.remove('dragging');
        }
      });

      progressBar.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        isDragging = true;
        progressBar.classList.add('dragging');
        setProgress(touch.clientX);
      }, { passive: false });

      progressBar.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (isDragging) {
          const touch = e.touches[0];
          setProgress(touch.clientX);
        }
      }, { passive: false });

      progressBar.addEventListener('touchend', () => {
        isDragging = false;
        progressBar.classList.remove('dragging');
      });

      volumeSlider.addEventListener('input', () => {
        audio.volume = parseFloat(volumeSlider.value);
      });

      document.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && document.activeElement?.tagName !== 'INPUT') {
          e.preventDefault();
          togglePlay();
        }
      });

      currentTimeSpan.textContent = '0:00';
      if (audio.duration) totalTimeSpan.textContent = formatTime(audio.duration);
      updateThumb(0);

      isPlaying = false;
      updatePlayButton();
    }

    function showError(msg) {
      songContent.innerHTML = `
        <div class="error-msg">
          <i class="fas fa-exclamation-triangle"></i>
          <p>${escapeHTML(msg)}</p>
          <br>
          <a href="./index.html" class="back-btn" style="display:inline-flex;margin-top:12px;">
            <i class="fas fa-arrow-left"></i> Back
          </a>
        </div>
      `;
    }

    loadSongs();
  })();
</script>

</body>
</html>
