<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>پخش‌کننده موسیقی</title>

  <!-- ===== Font Awesome (برای آیکون‌ها) ===== -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

  <!-- ===== فونت سفارشی از روت ===== -->
  <style>
    @font-face {
      font-family: 'CustomFont';
      src: url('./font.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    /* ===== Reset & Base ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #f5f5f7;
      --bg-surface: #ffffff;
      --bg-card: #ffffff;
      --text-primary: #1c1c1e;
      --text-secondary: #6c6c70;
      --text-muted: #8e8e93;
      --border-subtle: rgba(0, 0, 0, 0.06);
      --shadow-soft: 0 2px 12px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.02);
      --shadow-hover: 0 8px 30px rgba(0, 0, 0, 0.08);
      --radius-lg: 24px;
      --radius-md: 16px;
      --transition-smooth: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      --font-family: 'CustomFont', 'Inter', -apple-system, system-ui, sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #0a0a0b;
        --bg-surface: #1c1c1e;
        --bg-card: #2c2c2e;
        --text-primary: #f5f5f7;
        --text-secondary: #aeaeb2;
        --text-muted: #6c6c70;
        --border-subtle: rgba(255, 255, 255, 0.06);
        --shadow-soft: 0 2px 12px rgba(0, 0, 0, 0.4);
        --shadow-hover: 0 8px 30px rgba(0, 0, 0, 0.6);
      }
    }

    body {
      font-family: var(--font-family);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 16px;
      transition: background 0.2s, color 0.2s;
    }

    .player-container {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    /* ===== Back ===== */
    .back-nav {
      width: 100%;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 400;
      padding: 6px 14px;
      border-radius: 20px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      box-shadow: var(--shadow-soft);
      transition: all 0.2s;
      font-family: var(--font-family);
    }
    .back-btn:hover {
      background: var(--bg-card);
      color: var(--text-primary);
      transform: translateX(-4px);
    }

    /* ===== Layout ===== */
    .player-layout {
      display: flex;
      flex-direction: column;
      gap: 32px;
      width: 100%;
    }

    @media (min-width: 820px) {
      .player-layout {
        flex-direction: row;
        align-items: center;
        gap: 48px;
      }
      .player-left {
        flex: 1.2;
        order: 1;
        display: flex;
        flex-direction: column;
        gap: 28px;
        max-width: 500px;
      }
      .player-right {
        flex: 1;
        order: 2;
        display: flex;
        justify-content: center;
        align-items: center;
        max-width: 440px;
      }
      .cover-wrapper {
        width: 100%;
        aspect-ratio: 1/1;
        max-width: 440px;
      }
      .song-info {
        text-align: right;
        padding: 0;
      }
      .custom-player {
        max-width: 100%;
      }
    }

    @media (max-width: 819px) {
      .player-layout {
        flex-direction: column;
        align-items: center;
        gap: 24px;
      }
      .player-left {
        order: 2;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }
      .player-right {
        order: 1;
        width: 100%;
        display: flex;
        justify-content: center;
        padding: 0 12px;
      }
      .cover-wrapper {
        width: 100%;
        max-width: 380px;
        aspect-ratio: 1/1;
      }
      .song-info {
        text-align: center;
        padding: 0 8px;
      }
      .custom-player {
        max-width: 420px;
        width: 100%;
      }
    }

    @media (max-width: 500px) {
      .cover-wrapper {
        max-width: 300px;
      }
    }
    @media (max-width: 380px) {
      .cover-wrapper {
        max-width: 240px;
      }
    }

    /* ===== Cover ===== */
    .cover-wrapper {
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-soft), 0 0 0 1px var(--border-subtle);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s;
      background: var(--bg-surface);
    }
    .cover-wrapper:hover {
      transform: scale(1.02);
      box-shadow: var(--shadow-hover), 0 0 0 1px var(--border-subtle);
    }
    .cover-large {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.6s ease;
    }
    .cover-wrapper:hover .cover-large {
      transform: scale(1.04);
    }

    /* ===== Song Info ===== */
    .song-title {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 2px;
      line-height: 1.2;
      font-family: var(--font-family);
    }
    .song-artist {
      font-size: clamp(1rem, 1.5vw, 1.2rem);
      font-weight: 400;
      color: var(--text-secondary);
      font-family: var(--font-family);
    }

    /* ===== Custom Player ===== */
    .custom-player {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 4px 0;
    }

    .player-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(18px, 4vw, 36px);
    }
    .ctrl-btn {
      background: none;
      border: none;
      color: var(--text-primary);
      font-size: 1.3rem;
      cursor: pointer;
      padding: 6px;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      touch-action: manipulation;
      font-family: 'Font Awesome 6 Free', 'Font Awesome 6 Brands', sans-serif;
      font-weight: 900;
    }
    .ctrl-btn i {
      font-size: inherit;
      color: inherit;
    }
    .ctrl-btn:hover {
      background: var(--border-subtle);
    }
    .ctrl-btn:active {
      transform: scale(0.92);
    }
    .ctrl-btn.play-btn {
      font-size: clamp(2rem, 3.5vw, 2.6rem);
      width: clamp(58px, 8vw, 76px);
      height: clamp(58px, 8vw, 76px);
      background: var(--text-primary);
      color: var(--bg-primary);
      border-radius: 50%;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      transition: all 0.2s;
    }
    .ctrl-btn.play-btn:hover {
      transform: scale(1.04);
      background: var(--text-secondary);
    }
    .ctrl-btn.play-btn:active {
      transform: scale(0.92);
    }

    /* ===== Progress ===== */
    .progress-container {
      display: flex;
      align-items: center;
      gap: 12px;
      direction: ltr;
    }
    .progress-time {
      font-size: 0.7rem;
      font-weight: 400;
      color: var(--text-muted);
      min-width: 38px;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.2px;
      font-family: var(--font-family);
    }
    .progress-bar {
      flex: 1;
      height: 4px;
      background: var(--border-subtle);
      border-radius: 4px;
      cursor: pointer;
      position: relative;
      touch-action: none;
      transition: height 0.15s;
    }
    .progress-bar:hover {
      height: 6px;
    }
    .progress-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      background: var(--text-primary);
      border-radius: 4px;
      width: 0%;
      pointer-events: none;
      transition: width 0.05s linear;
    }
    .progress-bar::after {
      content: '';
      position: absolute;
      top: 50%;
      left: var(--thumb-pos, 0%);
      width: 14px;
      height: 14px;
      background: var(--text-primary);
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
      pointer-events: none;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), left 0.05s linear;
      z-index: 2;
    }
    .progress-bar.dragging::after,
    .progress-bar:hover::after {
      transform: translate(-50%, -50%) scale(1);
    }
    .progress-bar.dragging::after {
      transform: translate(-50%, -50%) scale(1.2);
    }

    /* ===== Volume ===== */
    .volume-control {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 2px;
      opacity: 0.5;
      transition: opacity 0.2s;
      direction: ltr;
    }
    .volume-control:hover {
      opacity: 1;
    }
    .volume-control i {
      color: var(--text-muted);
      font-size: 0.8rem;
      font-family: 'Font Awesome 6 Free', 'Font Awesome 6 Brands', sans-serif;
      font-weight: 900;
    }
    .volume-slider {
      width: 80px;
      height: 3px;
      -webkit-appearance: none;
      appearance: none;
      background: var(--border-subtle);
      border-radius: 3px;
      outline: none;
      touch-action: none;
    }
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--text-primary);
      cursor: pointer;
      border: none;
    }
    .volume-slider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--text-primary);
      cursor: pointer;
      border: none;
    }

    /* ===== Download & Loop Buttons ===== */
    .action-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-top: 6px;
      flex-wrap: wrap;
    }
    .action-btn {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: 40px;
      padding: 8px 18px;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-secondary);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: var(--shadow-soft);
      text-decoration: none;
      touch-action: manipulation;
      font-family: var(--font-family);
    }
    .action-btn i {
      font-size: 0.9rem;
      color: var(--text-muted);
      transition: color 0.2s;
      font-family: 'Font Awesome 6 Free', 'Font Awesome 6 Brands', sans-serif;
      font-weight: 900;
    }
    .action-btn:hover {
      background: var(--bg-card);
      border-color: var(--text-primary);
      color: var(--text-primary);
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
    }
    .action-btn:active {
      transform: scale(0.96);
    }
    .action-btn.loop-active {
      border-color: #007aff;
      background: rgba(0, 122, 255, 0.08);
      color: #007aff;
    }
    .action-btn.loop-active i {
      color: #007aff;
    }

    /* ===== Video ===== */
    .video-wrapper {
      width: 100%;
      max-width: 480px;
      border-radius: var(--radius-md);
      overflow: hidden;
      background: #000;
      box-shadow: var(--shadow-soft);
    }
    .video-wrapper video {
      width: 100%;
      display: block;
      aspect-ratio: 16/9;
      object-fit: cover;
      background: #0a0a0b;
    }

    /* ===== Error ===== */
    .error-msg {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      font-family: var(--font-family);
    }
    .error-msg i {
      font-size: 2.8rem;
      margin-bottom: 12px;
      opacity: 0.4;
      font-family: 'Font Awesome 6 Free', 'Font Awesome 6 Brands', sans-serif;
      font-weight: 900;
    }

    /* ===== Responsive ===== */
    @media (max-width: 500px) {
      .ctrl-btn {
        width: 36px;
        height: 36px;
        font-size: 1rem;
      }
      .ctrl-btn.play-btn {
        width: 52px;
        height: 52px;
        font-size: 1.7rem;
      }
      .player-controls {
        gap: 14px;
      }
      .progress-time {
        font-size: 0.6rem;
        min-width: 30px;
      }
      .volume-slider {
        width: 56px;
      }
      .volume-control i {
        font-size: 0.7rem;
      }
      .back-btn {
        font-size: 0.75rem;
        padding: 4px 12px;
      }
      .action-btn {
        padding: 6px 14px;
        font-size: 0.7rem;
      }
    }
  </style>
</head>
<body>
<div class="player-container">
  <nav class="back-nav">
    <a href="./index.html" class="back-btn">
      <i class="fas fa-arrow-right"></i> Back
    </a>
  </nav>

  <div id="songContent" class="player-layout">
    <!-- dynamic content -->
  </div>
</div>

<script>
  (function() {
    'use strict';

    const songContent = document.getElementById('songContent');
    let allSongs = [];
    let currentSongIndex = 0;
    let currentSong = null;
    let audio = null;
    let isPlaying = false;
    let loopEnabled = false;

    // ===== MediaSession API =====
    function updateMediaSession(song) {
      if (!song) return;
      if ('mediaSession' in navigator) {
        navigator.mediaSession.metadata = new MediaMetadata({
          title: song.title || 'Unknown Title',
          artist: song.artist || 'Unknown Artist',
          album: song.album || 'Album',
          artwork: [
            { src: song.cover || '', sizes: '512x512', type: 'image/jpeg' },
            { src: song.cover || '', sizes: '256x256', type: 'image/jpeg' },
          ]
        });

        navigator.mediaSession.setActionHandler('play', () => {
          if (audio) {
            audio.play().catch(() => {});
            isPlaying = true;
            updatePlayButton();
          }
        });
        navigator.mediaSession.setActionHandler('pause', () => {
          if (audio) {
            audio.pause();
            isPlaying = false;
            updatePlayButton();
          }
        });
        navigator.mediaSession.setActionHandler('previoustrack', () => {
          playPrev();
        });
        navigator.mediaSession.setActionHandler('nexttrack', () => {
          playNext();
        });
        navigator.mediaSession.setActionHandler('seekto', (details) => {
          if (audio && details.seekTime !== undefined) {
            audio.currentTime = details.seekTime;
          }
        });
      }
    }

    function updatePlayButton() {
      const playBtn = document.getElementById('playBtn');
      if (playBtn) {
        playBtn.innerHTML = isPlaying ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>';
      }
      if ('mediaSession' in navigator) {
        navigator.mediaSession.playbackState = isPlaying ? 'playing' : 'paused';
      }
    }

    function escapeHTML(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function getQueryParam(param) {
      return new URLSearchParams(window.location.search).get(param);
    }

    function formatTime(seconds) {
      if (isNaN(seconds) || !isFinite(seconds) || seconds < 0) return '0:00';
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      return m + ':' + (s < 10 ? '0' : '') + s;
    }

    async function loadSongs() {
      try {
        const resp = await fetch('./art.json');
        if (!resp.ok) throw new Error('art.json not found.');
        allSongs = await resp.json();
        if (!allSongs.length) throw new Error('No songs available.');

        const idParam = getQueryParam('id');
        let id = parseInt(idParam, 10);
        if (isNaN(id)) id = allSongs[0].id;

        const index = allSongs.findIndex(s => s.id === id);
        currentSongIndex = (index === -1) ? 0 : index;
        renderSong(currentSongIndex);
      } catch (err) {
        console.error(err);
        showError('Failed to load song data.');
      }
    }

    function renderSong(index) {
      if (!allSongs.length) return;
      currentSong = allSongs[index];
      if (!currentSong) return;

      const newUrl = `./song.html?id=${currentSong.id}`;
      window.history.replaceState({}, '', newUrl);

      updateMediaSession(currentSong);

      let leftHtml = `
        <div class="player-left">
          <div class="song-info">
            <h1 class="song-title">${escapeHTML(currentSong.title)}</h1>
            <p class="song-artist">${escapeHTML(currentSong.artist)}</p>
          </div>
      `;

      if (currentSong.hasMusic && currentSong.music) {
        leftHtml += `
          <div class="custom-player" id="customPlayer">
            <div class="progress-container">
              <span class="progress-time" id="currentTime">0:00</span>
              <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
              </div>
              <span class="progress-time" id="totalTime">0:00</span>
            </div>
            <div class="player-controls">
              <button class="ctrl-btn" id="prevBtn" aria-label="Previous"><i class="fas fa-step-backward"></i></button>
              <button class="ctrl-btn play-btn" id="playBtn" aria-label="Play/Pause"><i class="fas fa-play"></i></button>
              <button class="ctrl-btn" id="nextBtn" aria-label="Next"><i class="fas fa-step-forward"></i></button>
            </div>
            <div class="volume-control">
              <i class="fas fa-volume-down"></i>
              <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="0.8" />
              <i class="fas fa-volume-up"></i>
            </div>
            <div class="action-bar">
              <a href="${escapeHTML(currentSong.music)}" download class="action-btn" id="downloadBtn">
                <i class="fas fa-download"></i> Download
              </a>
              <button class="action-btn" id="loopBtn">
                <i class="fas fa-repeat"></i> Loop
              </button>
            </div>
          </div>
        `;
      }

      if (currentSong.hasVideo && currentSong.video) {
        leftHtml += `
          <div class="video-wrapper">
            <video controls playsinline>
              <source src="${escapeHTML(currentSong.video)}" type="video/mp4">
            </video>
          </div>
        `;
      }

      leftHtml += `</div>`;

      let rightHtml = `
        <div class="player-right">
          <div class="cover-wrapper">
            <img src="${escapeHTML(currentSong.cover)}" alt="${escapeHTML(currentSong.title)}" class="cover-large" loading="lazy" onerror="this.style.display='none'">
          </div>
        </div>
      `;

      if (!currentSong.hasMusic && !currentSong.hasVideo) {
        leftHtml = `
          <div class="error-msg">
            <i class="fas fa-ban"></i>
            <p>No playable content available.</p>
            <br>
            <a href="./index.html" class="back-btn" style="display:inline-flex;margin-top:12px;">
              <i class="fas fa-arrow-right"></i> Back
            </a>
          </div>
        `;
        rightHtml = '';
      }

      songContent.innerHTML = leftHtml + rightHtml;

      if (currentSong.hasMusic && currentSong.music) {
        initPlayer();
      }
    }

    function initPlayer() {
      if (!currentSong) return;
      const musicSrc = currentSong.music;

      if (audio) {
        audio.pause();
        audio.src = '';
      }
      audio = new Audio(musicSrc);
      audio.volume = parseFloat(document.getElementById('volumeSlider')?.value || 0.8);
      audio.loop = false;

      const playBtn = document.getElementById('playBtn');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const progressFill = document.getElementById('progressFill');
      const progressBar = document.getElementById('progressBar');
      const currentTimeSpan = document.getElementById('currentTime');
      const totalTimeSpan = document.getElementById('totalTime');
      const volumeSlider = document.getElementById('volumeSlider');
      const loopBtn = document.getElementById('loopBtn');

      function updateLoopUI() {
        if (loopBtn) {
          if (loopEnabled) {
            loopBtn.classList.add('loop-active');
            loopBtn.innerHTML = '<i class="fas fa-repeat"></i> Loop';
          } else {
            loopBtn.classList.remove('loop-active');
            loopBtn.innerHTML = '<i class="fas fa-repeat"></i> Loop';
          }
        }
      }
      updateLoopUI();

      loopBtn?.addEventListener('click', function(e) {
        e.preventDefault();
        loopEnabled = !loopEnabled;
        updateLoopUI();
      });

      function updateThumb(percent) {
        progressBar.style.setProperty('--thumb-pos', percent + '%');
      }

      audio.addEventListener('loadedmetadata', () => {
        totalTimeSpan.textContent = formatTime(audio.duration);
      });

      audio.addEventListener('timeupdate', () => {
        if (audio.duration) {
          const percent = (audio.currentTime / audio.duration) * 100;
          progressFill.style.width = percent + '%';
          currentTimeSpan.textContent = formatTime(audio.currentTime);
          updateThumb(percent);
        }
      });

      audio.addEventListener('ended', () => {
        if (loopEnabled) {
          audio.currentTime = 0;
          audio.play().catch(() => {});
          isPlaying = true;
          updatePlayButton();
        } else {
          isPlaying = false;
          updatePlayButton();
          playNext();
        }
      });

      function togglePlay() {
        if (isPlaying) {
          audio.pause();
          isPlaying = false;
        } else {
          audio.play().catch(() => {});
          isPlaying = true;
        }
        updatePlayButton();
      }

      playBtn.addEventListener('click', togglePlay);

      function playPrev() {
        let newIndex = currentSongIndex - 1;
        if (newIndex < 0) newIndex = allSongs.length - 1;
        changeSong(newIndex);
      }

      function playNext() {
        let newIndex = currentSongIndex + 1;
        if (newIndex >= allSongs.length) newIndex = 0;
        changeSong(newIndex);
      }

      function changeSong(index) {
        if (audio) { audio.pause(); audio.src = ''; }
        isPlaying = false;
        currentSongIndex = index;
        renderSong(index);
        setTimeout(() => {
          if (audio) {
            audio.play().catch(() => {});
            isPlaying = true;
            updatePlayButton();
          }
        }, 100);
      }

      prevBtn.addEventListener('click', playPrev);
      nextBtn.addEventListener('click', playNext);

      // ===== Progress dragging =====
      let isDragging = false;

      function setProgress(clientX) {
        const rect = progressBar.getBoundingClientRect();
        let x = clientX - rect.left;
        x = Math.max(0, Math.min(x, rect.width));
        const percent = rect.width > 0 ? x / rect.width : 0;
        progressFill.style.width = (percent * 100) + '%';
        if (audio.duration) {
          audio.currentTime = percent * audio.duration;
        }
        updateThumb(percent * 100);
      }

      progressBar.addEventListener('mousedown', (e) => {
        isDragging = true;
        progressBar.classList.add('dragging');
        setProgress(e.clientX);
      });

      document.addEventListener('mousemove', (e) => {
        if (isDragging) setProgress(e.clientX);
      });

      document.addEventListener('mouseup', () => {
        if (isDragging) {
          isDragging = false;
          progressBar.classList.remove('dragging');
        }
      });

      progressBar.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        isDragging = true;
        progressBar.classList.add('dragging');
        setProgress(touch.clientX);
      }, { passive: false });

      progressBar.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (isDragging) {
          const touch = e.touches[0];
          setProgress(touch.clientX);
        }
      }, { passive: false });

      progressBar.addEventListener('touchend', () => {
        isDragging = false;
        progressBar.classList.remove('dragging');
      });

      volumeSlider.addEventListener('input', () => {
        audio.volume = parseFloat(volumeSlider.value);
      });

      document.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && document.activeElement?.tagName !== 'INPUT') {
          e.preventDefault();
          togglePlay();
        }
      });

      currentTimeSpan.textContent = '0:00';
      if (audio.duration) totalTimeSpan.textContent = formatTime(audio.duration);
      updateThumb(0);

      isPlaying = false;
      updatePlayButton();
    }

    function showError(msg) {
      songContent.innerHTML = `
        <div class="error-msg">
          <i class="fas fa-exclamation-triangle"></i>
          <p>${escapeHTML(msg)}</p>
          <br>
          <a href="./index.html" class="back-btn" style="display:inline-flex;margin-top:12px;">
            <i class="fas fa-arrow-right"></i> Back
          </a>
        </div>
      `;
    }

    loadSongs();
  })();
</script>
</body>
</html>
