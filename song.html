<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>فراوا — پخش آهنگ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ===== Reset & Base ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background: #f5f5f7;
            color: #1c1c1e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background 0.2s;
        }

        /* حالت تاریک خودکار (اختیاری) */
        @media (prefers-color-scheme: dark) {
            body {
                background: #0a0a0b;
                color: #f5f5f7;
            }
            body .back-btn {
                background: rgba(255,255,255,0.04);
                color: #8e8e93;
            }
            body .back-btn:hover {
                background: rgba(255,255,255,0.08);
                color: #fff;
            }
            body .cover-wrapper {
                box-shadow: 0 12px 40px rgba(0,0,0,0.6);
            }
            body .cover-large {
                background: #2c2c2e;
            }
            body .song-artist {
                color: #aeaeb2;
            }
            body .ctrl-btn {
                color: #f5f5f7;
            }
            body .ctrl-btn:hover {
                background: rgba(255,255,255,0.06);
            }
            body .ctrl-btn.play-btn {
                background: #f5f5f7;
                color: #1c1c1e;
                box-shadow: 0 4px 20px rgba(255,255,255,0.08);
            }
            body .ctrl-btn.play-btn:hover {
                background: #e5e5ea;
            }
            body .progress-bar {
                background: #3a3a3c;
            }
            body .progress-fill {
                background: #f5f5f7;
            }
            body .progress-bar::after {
                background: #f5f5f7;
            }
            body .progress-time {
                color: #6c6c70;
            }
            body .volume-slider {
                background: #3a3a3c;
            }
            body .volume-slider::-webkit-slider-thumb {
                background: #f5f5f7;
            }
            body .volume-slider::-moz-range-thumb {
                background: #f5f5f7;
            }
            body .volume-control i {
                color: #6c6c70;
            }
        }

        .player-container {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
        }

        /* ===== Back ===== */
        .back-nav {
            width: 100%;
            margin-bottom: 28px;
            padding-right: 8px;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #8e8e93;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 400;
            padding: 6px 12px;
            border-radius: 20px;
            background: rgba(0,0,0,0.02);
            transition: all 0.2s;
        }
        .back-btn:hover {
            background: rgba(0,0,0,0.05);
            color: #1c1c1e;
        }

        /* ===== Layout (دو ستونه در نمایشگر بزرگ) ===== */
        .player-layout {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
        }

        @media (min-width: 820px) {
            .player-layout {
                flex-direction: row;
                align-items: center;
                justify-content: center;
                gap: 48px;
            }
            .player-left {
                flex: 1.2;
                order: 1;
                display: flex;
                flex-direction: column;
                gap: 24px;
                max-width: 480px;
            }
            .player-right {
                flex: 1;
                order: 2;
                display: flex;
                justify-content: center;
                align-items: center;
                max-width: 420px;
            }
            .cover-wrapper {
                width: 100%;
                max-width: 420px;
                aspect-ratio: 1/1;
            }
            .song-info {
                text-align: right;
                padding: 0;
            }
            .custom-player {
                max-width: 100%;
            }
        }

        @media (max-width: 819px) {
            .player-layout {
                flex-direction: column;
                gap: 28px;
            }
            .player-left {
                width: 100%;
                order: 2;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 20px;
            }
            .player-right {
                width: 100%;
                order: 1;
                display: flex;
                justify-content: center;
            }
            .cover-wrapper {
                max-width: 320px;
                width: 100%;
                aspect-ratio: 1/1;
            }
            .song-info {
                text-align: center;
                padding: 0 8px;
            }
            .custom-player {
                max-width: 400px;
                width: 100%;
            }
        }

        /* ===== Cover ===== */
        .cover-wrapper {
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 12px 40px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.02);
            transition: box-shadow 0.3s, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }
        .cover-wrapper:hover {
            transform: scale(1.02);
            box-shadow: 0 20px 60px rgba(0,0,0,0.12);
        }
        .cover-large {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            background: #e5e5ea;
            transition: transform 0.6s ease;
        }
        .cover-wrapper:hover .cover-large {
            transform: scale(1.04);
        }

        /* ===== Song Info ===== */
        .song-title {
            font-size: clamp(1.6rem, 4vw, 2.4rem);
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
            line-height: 1.2;
        }
        .song-artist {
            font-size: clamp(1rem, 1.5vw, 1.2rem);
            font-weight: 400;
            color: #8e8e93;
        }

        /* ===== Custom Player ===== */
        .custom-player {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 8px 0;
        }

        .player-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(18px, 4vw, 36px);
        }
        .ctrl-btn {
            background: none;
            border: none;
            color: #1c1c1e;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            touch-action: manipulation;
        }
        .ctrl-btn:hover {
            background: rgba(0,0,0,0.04);
        }
        .ctrl-btn:active {
            transform: scale(0.92);
        }
        .ctrl-btn.play-btn {
            font-size: clamp(2rem, 3.5vw, 2.6rem);
            width: clamp(58px, 8vw, 76px);
            height: clamp(58px, 8vw, 76px);
            background: #1c1c1e;
            color: #fff;
            border-radius: 50%;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            transition: all 0.2s;
        }
        .ctrl-btn.play-btn:hover {
            transform: scale(1.04);
            background: #2c2c2e;
        }
        .ctrl-btn.play-btn:active {
            transform: scale(0.92);
        }

        /* progress */
        .progress-container {
            display: flex;
            align-items: center;
            gap: 12px;
            direction: ltr;
        }
        .progress-time {
            font-size: 0.7rem;
            font-weight: 400;
            color: #8e8e93;
            min-width: 38px;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.2px;
        }

        .progress-bar {
            flex: 1;
            height: 4px;
            background: #d1d1d6;
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            touch-action: none;
            transition: height 0.15s;
        }
        .progress-bar:hover {
            height: 6px;
        }
        .progress-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: #1c1c1e;
            border-radius: 4px;
            width: 0%;
            pointer-events: none;
            transition: width 0.05s linear;
        }

        /* thumb - با استفاده از متغیر --thumb-pos */
        .progress-bar::after {
            content: '';
            position: absolute;
            top: 50%;
            left: var(--thumb-pos, 0%);
            width: 14px;
            height: 14px;
            background: #1c1c1e;
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            pointer-events: none;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), left 0.05s linear;
            z-index: 2;
        }
        .progress-bar.dragging::after,
        .progress-bar:hover::after {
            transform: translate(-50%, -50%) scale(1);
        }
        .progress-bar.dragging::after {
            transform: translate(-50%, -50%) scale(1.2);
            background: #1c1c1e;
        }

        /* ===== Volume ===== */
        .volume-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 4px;
            opacity: 0.5;
            transition: opacity 0.2s;
        }
        .volume-control:hover {
            opacity: 1;
        }
        .volume-control i {
            color: #8e8e93;
            font-size: 0.8rem;
        }
        .volume-slider {
            width: 80px;
            height: 3px;
            -webkit-appearance: none;
            appearance: none;
            background: #d1d1d6;
            border-radius: 3px;
            outline: none;
            touch-action: none;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #1c1c1e;
            cursor: pointer;
            border: none;
        }
        .volume-slider::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #1c1c1e;
            cursor: pointer;
            border: none;
        }

        /* ===== Video ===== */
        .video-wrapper {
            width: 100%;
            max-width: 480px;
            border-radius: 16px;
            overflow: hidden;
            background: #000;
            margin-top: 4px;
        }
        .video-wrapper video {
            width: 100%;
            display: block;
            aspect-ratio: 16/9;
            object-fit: cover;
            background: #0a0a0b;
        }

        /* ===== Error ===== */
        .error-msg {
            text-align: center;
            padding: 40px 20px;
            color: #8e8e93;
        }
        .error-msg i {
            font-size: 2.8rem;
            margin-bottom: 12px;
            opacity: 0.4;
        }

        /* ===== Responsive ===== */
        @media (max-width: 500px) {
            .cover-wrapper {
                max-width: 240px;
                border-radius: 20px;
            }
            .song-title {
                font-size: 1.4rem;
            }
            .song-artist {
                font-size: 0.95rem;
            }
            .ctrl-btn {
                width: 36px;
                height: 36px;
                font-size: 1rem;
            }
            .ctrl-btn.play-btn {
                width: 52px;
                height: 52px;
                font-size: 1.7rem;
            }
            .player-controls {
                gap: 14px;
            }
            .progress-time {
                font-size: 0.6rem;
                min-width: 30px;
            }
            .volume-slider {
                width: 56px;
            }
            .back-btn {
                font-size: 0.75rem;
            }
        }

        @media (max-width: 380px) {
            .cover-wrapper {
                max-width: 180px;
            }
        }
    </style>
</head>
<body>
    <div class="player-container">
        <nav class="back-nav">
            <a href="./index.html" class="back-btn">
                <i class="fas fa-arrow-right"></i> بازگشت
            </a>
        </nav>

        <div id="songContent" class="player-layout">
            <!-- محتوای داینامیک توسط JS -->
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            const songContent = document.getElementById('songContent');
            let allSongs = [];
            let currentSongIndex = 0;
            let currentSong = null;
            let audio = null;
            let isPlaying = false;

            function escapeHTML(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            function getQueryParam(param) {
                return new URLSearchParams(window.location.search).get(param);
            }

            function formatTime(seconds) {
                if (isNaN(seconds) || !isFinite(seconds) || seconds < 0) return '0:00';
                const m = Math.floor(seconds / 60);
                const s = Math.floor(seconds % 60);
                return m + ':' + (s < 10 ? '0' : '') + s;
            }

            async function loadSongs() {
                try {
                    const resp = await fetch('./art.json');
                    if (!resp.ok) throw new Error('فایل art.json یافت نشد.');
                    allSongs = await resp.json();
                    if (!allSongs.length) throw new Error('هیچ آهنگی وجود ندارد.');

                    const idParam = getQueryParam('id');
                    let id = parseInt(idParam, 10);
                    if (isNaN(id)) id = allSongs[0].id;

                    const index = allSongs.findIndex(s => s.id === id);
                    currentSongIndex = (index === -1) ? 0 : index;
                    renderSong(currentSongIndex);
                } catch (err) {
                    console.error(err);
                    showError('خطا در بارگذاری اطلاعات آهنگ.');
                }
            }

            function renderSong(index) {
                if (!allSongs.length) return;
                currentSong = allSongs[index];
                if (!currentSong) return;

                const newUrl = `./song.html?id=${currentSong.id}`;
                window.history.replaceState({}, '', newUrl);

                // ساختار دو ستونه (چپ = اطلاعات+پلیر، راست = کاور)
                let leftHtml = `
                    <div class="player-left">
                        <div class="song-info">
                            <h1 class="song-title">${escapeHTML(currentSong.title)}</h1>
                            <p class="song-artist">${escapeHTML(currentSong.artist)}</p>
                        </div>
                `;

                if (currentSong.hasMusic && currentSong.music) {
                    leftHtml += `
                        <div class="custom-player" id="customPlayer">
                            <div class="progress-container">
                                <span class="progress-time" id="currentTime">0:00</span>
                                <div class="progress-bar" id="progressBar">
                                    <div class="progress-fill" id="progressFill"></div>
                                </div>
                                <span class="progress-time" id="totalTime">0:00</span>
                            </div>
                            <div class="player-controls">
                                <button class="ctrl-btn" id="prevBtn" aria-label="قبلی"><i class="fas fa-step-backward"></i></button>
                                <button class="ctrl-btn play-btn" id="playBtn" aria-label="پلی/مکث"><i class="fas fa-play"></i></button>
                                <button class="ctrl-btn" id="nextBtn" aria-label="بعدی"><i class="fas fa-step-forward"></i></button>
                            </div>
                            <div class="volume-control">
                                <i class="fas fa-volume-down"></i> <!-- صدای کم سمت چپ -->
                                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="0.8" dir="ltr">
                                <i class="fas fa-volume-up"></i> <!-- صدای زیاد سمت راست -->
                            </div>
                        </div>
                    `;
                }

                if (currentSong.hasVideo && currentSong.video) {
                    leftHtml += `
                        <div class="video-wrapper">
                            <video controls playsinline>
                                <source src="${escapeHTML(currentSong.video)}" type="video/mp4">
                            </video>
                        </div>
                    `;
                }

                leftHtml += `</div>`; // بستن player-left

                let rightHtml = `
                    <div class="player-right">
                        <div class="cover-wrapper">
                            <img src="${escapeHTML(currentSong.cover)}" alt="${escapeHTML(currentSong.title)}" class="cover-large" loading="lazy" onerror="this.style.display='none'">
                        </div>
                    </div>
                `;

                if (!currentSong.hasMusic && !currentSong.hasVideo) {
                    leftHtml = `
                        <div class="error-msg">
                            <i class="fas fa-ban"></i>
                            <p>محتوای قابل پخشی موجود نیست.</p>
                            <br>
                            <a href="./index.html" class="back-btn" style="display:inline-flex;margin-top:12px;">
                                <i class="fas fa-arrow-right"></i> بازگشت
                            </a>
                        </div>
                    `;
                    rightHtml = '';
                }

                // در موبایل، ترتیب: کاور بالا، اطلاعات پایین
                // با استفاده از CSS order کنترل می‌شود
                songContent.innerHTML = leftHtml + rightHtml;

                if (currentSong.hasMusic && currentSong.music) {
                    initPlayer();
                }
            }

            function initPlayer() {
                if (!currentSong) return;
                const musicSrc = currentSong.music;

                if (audio) {
                    audio.pause();
                    audio.src = '';
                }
                audio = new Audio(musicSrc);
                audio.volume = parseFloat(document.getElementById('volumeSlider')?.value || 0.8);
                audio.loop = false;

                const playBtn = document.getElementById('playBtn');
                const prevBtn = document.getElementById('prevBtn');
                const nextBtn = document.getElementById('nextBtn');
                const progressFill = document.getElementById('progressFill');
                const progressBar = document.getElementById('progressBar');
                const currentTimeSpan = document.getElementById('currentTime');
                const totalTimeSpan = document.getElementById('totalTime');
                const volumeSlider = document.getElementById('volumeSlider');

                // تابع به‌روزرسانی thumb position
                function updateThumb(percent) {
                    progressBar.style.setProperty('--thumb-pos', percent + '%');
                }

                audio.addEventListener('loadedmetadata', () => {
                    totalTimeSpan.textContent = formatTime(audio.duration);
                });

                audio.addEventListener('timeupdate', () => {
                    if (audio.duration) {
                        const percent = (audio.currentTime / audio.duration) * 100;
                        progressFill.style.width = percent + '%';
                        currentTimeSpan.textContent = formatTime(audio.currentTime);
                        updateThumb(percent);
                    }
                });

                audio.addEventListener('ended', () => {
                    playBtn.innerHTML = '<i class="fas fa-play"></i>';
                    isPlaying = false;
                    playNext();
                });

                function togglePlay() {
                    if (isPlaying) {
                        audio.pause();
                        playBtn.innerHTML = '<i class="fas fa-play"></i>';
                    } else {
                        audio.play().catch(() => {});
                        playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                    }
                    isPlaying = !isPlaying;
                }

                playBtn.addEventListener('click', togglePlay);

                function playPrev() {
                    let newIndex = currentSongIndex - 1;
                    if (newIndex < 0) newIndex = allSongs.length - 1;
                    changeSong(newIndex);
                }

                function playNext() {
                    let newIndex = currentSongIndex + 1;
                    if (newIndex >= allSongs.length) newIndex = 0;
                    changeSong(newIndex);
                }

                function changeSong(index) {
                    if (audio) { audio.pause(); audio.src = ''; }
                    isPlaying = false;
                    currentSongIndex = index;
                    renderSong(index);
                }

                prevBtn.addEventListener('click', playPrev);
                nextBtn.addEventListener('click', playNext);

                // Progress dragging
                let isDragging = false;

                function setProgress(clientX) {
                    const rect = progressBar.getBoundingClientRect();
                    let x = clientX - rect.left;
                    x = Math.max(0, Math.min(x, rect.width));
                    const percent = rect.width > 0 ? x / rect.width : 0;
                    progressFill.style.width = (percent * 100) + '%';
                    if (audio.duration) {
                        audio.currentTime = percent * audio.duration;
                    }
                    updateThumb(percent * 100);
                }

                progressBar.addEventListener('mousedown', (e) => {
                    isDragging = true;
                    progressBar.classList.add('dragging');
                    setProgress(e.clientX);
                });

                document.addEventListener('mousemove', (e) => {
                    if (isDragging) setProgress(e.clientX);
                });

                document.addEventListener('mouseup', () => {
                    if (isDragging) {
                        isDragging = false;
                        progressBar.classList.remove('dragging');
                    }
                });

                progressBar.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    const touch = e.touches[0];
                    isDragging = true;
                    progressBar.classList.add('dragging');
                    setProgress(touch.clientX);
                }, { passive: false });

                progressBar.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    if (isDragging) {
                        const touch = e.touches[0];
                        setProgress(touch.clientX);
                    }
                }, { passive: false });

                progressBar.addEventListener('touchend', () => {
                    isDragging = false;
                    progressBar.classList.remove('dragging');
                });

                volumeSlider.addEventListener('input', () => {
                    audio.volume = parseFloat(volumeSlider.value);
                });

                document.addEventListener('keydown', (e) => {
                    if (e.code === 'Space' && document.activeElement?.tagName !== 'INPUT') {
                        e.preventDefault();
                        togglePlay();
                    }
                });

                currentTimeSpan.textContent = '0:00';
                if (audio.duration) totalTimeSpan.textContent = formatTime(audio.duration);
                updateThumb(0);
            }

            function showError(msg) {
                songContent.innerHTML = `
                    <div class="error-msg">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>${escapeHTML(msg)}</p>
                        <br>
                        <a href="./index.html" class="back-btn" style="display:inline-flex;margin-top:12px;">
                            <i class="fas fa-arrow-right"></i> بازگشت
                        </a>
                    </div>
                `;
            }

            loadSongs();
        })();
    </script>
</body>
</html>
